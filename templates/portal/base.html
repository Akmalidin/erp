<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Клиентский портал{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg: #f1f5f9;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 12px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Navbar */
        .portal-nav {
            background: var(--primary);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(59,130,246,0.3);
        }
        .portal-nav-brand { color: #fff; font-weight: 700; font-size: 18px; text-decoration: none; }
        .portal-nav-links { display: flex; gap: 8px; align-items: center; }
        .portal-nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 14px;
            transition: background 0.15s;
        }
        .portal-nav-links a:hover, .portal-nav-links a.active { background: rgba(255,255,255,0.2); color: #fff; }
        .cart-badge {
            background: #fff;
            color: var(--primary);
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 700;
            margin-left: 4px;
        }
        .nav-client-name { color: rgba(255,255,255,0.75); font-size: 13px; margin-right: 8px; }

        /* Layout */
        .portal-content { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

        /* Cards */
        .card { background: var(--card); border-radius: var(--radius); padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 16px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); }

        /* Page header */
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .page-header h1 { font-size: 22px; font-weight: 700; }
        .page-subtitle { color: var(--text-muted); font-size: 14px; margin-top: 2px; }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: all 0.15s; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-sm { padding: 5px 12px; font-size: 13px; }

        /* Table */
        .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .data-table th { text-align: left; padding: 10px 12px; background: #f8fafc; border-bottom: 2px solid var(--border); font-size: 12px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; }
        .data-table td { padding: 12px; border-bottom: 1px solid var(--border); }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: #f8fafc; }

        /* Status badges */
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-new { background: #dbeafe; color: #1d4ed8; }
        .badge-processing { background: #fef3c7; color: #92400e; }
        .badge-completed { background: #d1fae5; color: #065f46; }
        .badge-cancelled { background: #fee2e2; color: #991b1b; }
        .badge-returned { background: #ede9fe; color: #4c1d95; }

        /* Messages */
        .messages { margin-bottom: 16px; }
        .message { padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; }
        .message-success { background: #d1fae5; color: #065f46; }
        .message-error { background: #fee2e2; color: #991b1b; }
        .message-info { background: #dbeafe; color: #1e40af; }

        /* Form */
        .form-input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: #fff; color: var(--text); outline: none; transition: border-color 0.15s; }
        .form-input:focus { border-color: var(--primary); }
        .form-label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }

        /* Empty state */
        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
        .empty-state svg { width: 56px; height: 56px; margin-bottom: 16px; opacity: 0.4; }
        .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

        /* Note */
        .note-block { background: #f8fafc; border-left: 3px solid var(--primary); border-radius: 0 8px 8px 0; padding: 10px 14px; margin-bottom: 10px; }
        .note-block.note-admin { border-color: var(--success); }
        .note-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .note-text { font-size: 14px; }

        /* Product grid */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
        .product-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: 1px solid var(--border); }
        .product-card-oem { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .product-card-name { font-weight: 600; font-size: 15px; margin-bottom: 8px; }
        .product-card-price { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
        .product-card-stock { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }

        /* Pagination */
        .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
        .page-link { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); text-decoration: none; font-size: 14px; color: var(--text); }
        .page-link:hover, .page-link.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Mobile */
        @media (max-width: 600px) {
            .portal-nav { padding: 0 12px; }
            .portal-content { padding: 16px 12px; }
            .portal-nav-links a span { display: none; }
        }
    </style>
</head>
<body>

{% if request.session.portal_client_id %}
<nav class="portal-nav">
    <a href="{% url 'portal_dashboard' %}" class="portal-nav-brand">AutoParts</a>
    <div class="portal-nav-links">
        <a href="{% url 'portal_dashboard' %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path></svg>
            <span>Мои заказы</span>
        </a>
        <a href="{% url 'portal_catalog' %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="7" height="7"></rect><rect x="15" y="3" width="7" height="7"></rect><rect x="15" y="14" width="7" height="7"></rect><rect x="2" y="14" width="7" height="7"></rect></svg>
            <span>Каталог</span>
        </a>
        <a href="{% url 'portal_cart' %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"></path></svg>
            <span>Корзина</span>
            {% if cart_count %}<span class="cart-badge">{{ cart_count }}</span>{% endif %}
        </a>
        <a href="{% url 'portal_logout' %}">Выйти</a>
    </div>
</nav>
{% endif %}

<div class="portal-content">
    {% if messages %}
    <div class="messages">
        {% for msg in messages %}
        <div class="message message-{{ msg.tags|default:'info' }}">{{ msg }}</div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
